# path to the task data directory
data_dir: "data"
preprocess_data: False

goal: null
eval: null

log_dir: logs
workspace_dir: workspaces

# whether to copy the data to the workspace directory (otherwise it will be symlinked)
# copying is recommended to prevent the agent from accidentally modifying the original data
copy_data: True

exp_name: run # a random experiment name will be generated if not provided

# settings for code execution
exec:
  backend: ${oc.env:AI_SCIENTIST_EXEC_BACKEND}
  timeout: ${oc.env:AI_SCIENTIST_EXEC_TIMEOUT,3600}
  agent_file_name: runfile.py
  format_tb_ipython: False
  wsl_ssh:
    host: ${oc.env:AI_SCIENTIST_WSL_SSH_HOST,null}
    port: ${oc.env:AI_SCIENTIST_WSL_SSH_PORT,22}
    user: ${oc.env:AI_SCIENTIST_WSL_SSH_USER,null}
    private_key_path_env: AI_SCIENTIST_WSL_SSH_PRIVATE_KEY_PATH
    password_env: AI_SCIENTIST_WSL_SSH_PASSWORD
    host_candidates_env: AI_SCIENTIST_WSL_SSH_HOST_CANDIDATES
    connect_timeout: ${oc.env:AI_SCIENTIST_WSL_SSH_CONNECT_TIMEOUT,30}
    command_timeout: ${oc.env:AI_SCIENTIST_WSL_SSH_COMMAND_TIMEOUT,1800}
    readiness_timeout: ${oc.env:AI_SCIENTIST_WSL_SSH_READINESS_TIMEOUT,120}
    setup_timeout: ${oc.env:AI_SCIENTIST_WSL_SSH_SETUP_TIMEOUT,1800}
    wsl_distro: ${oc.env:AI_SCIENTIST_WSL_DISTRO,Ubuntu}
    remote_root: ${oc.env:AI_SCIENTIST_WSL_REMOTE_ROOT,null}
    venv_path: ${oc.env:AI_SCIENTIST_WSL_VENV_PATH,null}
    windows_stage_dir_name: ${oc.env:AI_SCIENTIST_WSL_STAGE_DIR,auctrace-stage}
    install_project_requirements: ${oc.env:AI_SCIENTIST_WSL_INSTALL_PROJECT_REQUIREMENTS,true}
    requirements_file: requirements.txt
    pip_install_timeout: ${oc.env:AI_SCIENTIST_WSL_PIP_INSTALL_TIMEOUT,1800}
    cleanup_remote_workspace: ${oc.env:AI_SCIENTIST_WSL_CLEANUP_REMOTE_WORKSPACE,true}
    cleanup_stage_archive: ${oc.env:AI_SCIENTIST_WSL_CLEANUP_STAGE_ARCHIVE,true}
    max_archive_mb: ${oc.env:AI_SCIENTIST_WSL_MAX_ARCHIVE_MB,1024}
    min_free_disk_gb: ${oc.env:AI_SCIENTIST_WSL_MIN_FREE_DISK_GB,50}
    min_free_memory_gb: ${oc.env:AI_SCIENTIST_WSL_MIN_FREE_MEMORY_GB,4}
    recommended_workers: ${oc.env:AI_SCIENTIST_WSL_RECOMMENDED_WORKERS,1}
    auto_install_missing_packages: ${oc.env:AI_SCIENTIST_WSL_AUTO_INSTALL_MISSING_PACKAGES,true}
    max_auto_dependency_installs: ${oc.env:AI_SCIENTIST_WSL_MAX_AUTO_DEPENDENCY_INSTALLS,3}
  vast:
    api_key_env: VAST_API_KEY
    private_ssh_key_path_env: VAST_SSH_PRIVATE_KEY_PATH
    public_ssh_key_path_env: VAST_SSH_PUBLIC_KEY_PATH
    existing_instance_id: ${oc.env:AI_SCIENTIST_VAST_EXISTING_INSTANCE_ID,null}
    offer_id: ${oc.env:AI_SCIENTIST_VAST_OFFER_ID,null}
    auto_destroy: ${oc.env:AI_SCIENTIST_VAST_AUTO_DESTROY,true}
    readiness_timeout: ${oc.env:AI_SCIENTIST_VAST_READINESS_TIMEOUT,900}
    setup_timeout: ${oc.env:AI_SCIENTIST_VAST_SETUP_TIMEOUT,1800}
    instance_poll_interval: 10
    max_provision_attempts: 3
    ssh_probe_retries: 6
    ssh_probe_retry_delay: 10
    ssh_probe_timeout: 30
    ssh_probe_connect_timeout: 15
    remote_root: /workspace/auctrace
    image: pytorch/pytorch:2.4.1-cuda12.4-cudnn9-devel
    disk_gb: 64
    runtype: ssh_direct
    label_prefix: auctrace
    install_project_requirements: true
    requirements_file: requirements.txt
    pip_install_timeout: 1800
    auto_install_missing_packages: true
    max_auto_dependency_installs: 3
    setup_commands: []
    search:
      limit: ${oc.env:AI_SCIENTIST_VAST_SEARCH_LIMIT,25}
      order: ${oc.env:AI_SCIENTIST_VAST_SEARCH_ORDER,dph_total}
      type: ${oc.env:AI_SCIENTIST_VAST_SEARCH_TYPE,on-demand}
      verified: ${oc.env:AI_SCIENTIST_VAST_SEARCH_VERIFIED,true}
      rentable: ${oc.env:AI_SCIENTIST_VAST_SEARCH_RENTABLE,true}
      rented: ${oc.env:AI_SCIENTIST_VAST_SEARCH_RENTED,false}
      num_gpus: ${oc.env:AI_SCIENTIST_VAST_SEARCH_NUM_GPUS,1}
      reliability_min: ${oc.env:AI_SCIENTIST_VAST_SEARCH_RELIABILITY_MIN,0.95}
      inet_up_min: ${oc.env:AI_SCIENTIST_VAST_SEARCH_INET_UP_MIN,100}
      direct_port_count_min: ${oc.env:AI_SCIENTIST_VAST_SEARCH_DIRECT_PORT_COUNT_MIN,1}

generate_report: True
# LLM settings for final report from journal
report:
  model: ${oc.env:AI_SCIENTIST_MODEL_REPORT}
  fallback_model: ${oc.env:AI_SCIENTIST_MODEL_REPORT_FALLBACK,null}
  temp: 1.0

experiment:
  num_syn_datasets: 1

debug:
  stage4: False

# agent hyperparams
agent:
  type: parallel
  num_workers: ${oc.env:AI_SCIENTIST_NUM_WORKERS,4}
  stages:
    stage1_max_iters: 20
    stage2_max_iters: 12
    stage3_max_iters: 12
    stage4_max_iters: 18
  # how many improvement iterations to run
  steps: 5 # if stage-specific max_iters are not provided, the agent will use this value for all stages
  # whether to instruct the agent to use CV (set to 1 to disable)
  k_fold_validation: 1
  multi_seed_eval:
    num_seeds: 3 # should be the same as num_workers if num_workers < 3. Otherwise, set it to be 3.
  # whether to instruct the agent to generate a prediction function
  expose_prediction: False
  # whether to provide the agent with a preview of the data
  data_preview: False

  # LLM settings for coding ??? strongest coding model
  code:
    model: ${oc.env:AI_SCIENTIST_MODEL_CODE}
    fallback_model: ${oc.env:AI_SCIENTIST_MODEL_CODE_FALLBACK,null}
    temp: 1.0
    max_tokens: 12000

  # LLM settings for evaluating program output / tracebacks
  feedback:
    model: ${oc.env:AI_SCIENTIST_MODEL_FEEDBACK}
    fallback_model: ${oc.env:AI_SCIENTIST_MODEL_FEEDBACK_FALLBACK,null}
    temp: 0.5
    max_tokens: 8192

  vlm_feedback:
    model: ${oc.env:AI_SCIENTIST_MODEL_VLM_FEEDBACK}
    fallback_model: ${oc.env:AI_SCIENTIST_MODEL_VLM_FEEDBACK_FALLBACK,null}
    temp: 0.5
    max_tokens: null

  search:
    max_debug_depth: 3
    debug_prob: 0.5
    num_drafts: 3

  # Options for summarizing findings and selecting the best node
  # If not specified, the default behavior will be used.

  summary:
    model: ${oc.env:AI_SCIENTIST_MODEL_SUMMARY}
    fallback_model: ${oc.env:AI_SCIENTIST_MODEL_SUMMARY_FALLBACK,null}
    temp: 0.3

  select_node:
    model: ${oc.env:AI_SCIENTIST_MODEL_SELECT_NODE}
    fallback_model: ${oc.env:AI_SCIENTIST_MODEL_SELECT_NODE_FALLBACK,null}
    temp: 0.3
